<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anonymous Community Map</title>
  
  <!-- Leaflet CSS must load before the map initializes -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background-color: #ffffff; color: #111111; }
    
    .controls { padding: 15px 10px; background: #e8e8e8; }
    
    /* Improved button contrast and Mobile Touch Targets */
    button { 
      background: #005a87; 
      color: #ffffff; 
      border: none; 
      padding: 14px 20px; /* Increased padding for thumbs! */
      margin: 5px; 
      cursor: pointer; 
      border-radius: 4px; 
      font-weight: bold; 
      font-size: 15px;
      min-height: 44px; /* Minimum mobile touch target size */
    }
    
    button:hover { background: #004466; }
    
    button:focus { 
      outline: 3px solid #ffcc00; 
      outline-offset: 2px; 
    }
    
    .btn-logout { background: #b30000; }
    .btn-logout:hover { background: #8a0000; }

    textarea { width: 100%; box-sizing: border-box; font-family: monospace; padding: 8px; }



    /* Security: Login Screen Overlay */
    #login-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: white; z-index: 9999; display: flex; 
      flex-direction: column; align-items: center; justify-content: center;
    }
    #login-screen input { padding: 10px; font-size: 16px; margin: 10px 0; width: 80%; max-width: 300px; border: 2px solid #555; border-radius: 4px;}
    
    /* Hides the main app initially for security */
    .hidden-screen { display: none !important; } 

    /* Modal Overlay Background */
    .modal-overlay {
      display: none; 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 10000;
      align-items: center; justify-content: center;
    }

    /* Modal Content Box */
    .modal-content {
      background: white; padding: 20px; border-radius: 8px;
      width: 90%; max-width: 400px;
      max-height: 90vh; /* Prevents modal from getting too tall */
      overflow-y: auto; /* Allows scrolling if on a small screen */
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .modal-content h3 { margin-top: 0; }
    .modal-content label { font-weight: bold; display: block; margin-top: 10px; }
    .modal-content input, .modal-content textarea, .modal-content select { 
      width: 100%; padding: 8px; margin-top: 5px; 
      box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;
    }
    .modal-buttons { margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px; }

    /* Cancel Button Style */
    .btn-cancel { background: #666; }
    .btn-cancel:hover { background: #444; }

    /* Custom cursor for dropping pins */
    .crosshair-mode { cursor: crosshair !important; }

    /* 1. Map CSS Fixes - Edge to Edge, No Gap */
        /* 1. Map CSS Fixes - Edge to Edge, No Gap */
    #map {
      margin: 0 auto; /* Centers the map */
      border: 4px solid #333; /* Put the full border back! */
      border-radius: 8px; /* Restored the rounded corners */
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      height: 55vh; 
      min-height: 400px; 
      width: 95%; /* <--- THIS FIXES THE SIDE MARGINS! */
      position: relative;
      box-sizing: border-box;
      z-index: 1;
    }


    /* 2. Flashing / Pulsing animation for High Priority Pins */
    .pulse-high-priority {
      animation: pulsate 1s infinite alternate;
    }
    @keyframes pulsate {
      0% { transform: scale(1); filter: drop-shadow(0 0 2px red); }
      100% { transform: scale(1.15); filter: drop-shadow(0 0 12px red); }
    }

    /* 3. Greyed-out Disabled Submit Button */
    #submitReportBtn:disabled {
      background-color: #cccccc !important;
      color: #666666 !important;
      cursor: not-allowed;
    }

    /* 4. Empty Form Error Message */
    .error-msg {
      color: #d32f2f;
      font-size: 13px;
      font-weight: bold;
      display: none;
      margin-top: 10px;
      text-align: center;
    }

    /* 5. Custom Floating Top Right Menu */
    .top-right-menu {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 9999; 
    }
    
    .menu-fab {
      width: 45px;
      height: 45px;
      border-radius: 5px;
      background-color: #ffffff;
      color: #333333;
      border: 2px solid #555;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }

    .dropdown-content {
      position: absolute;
      right: 0;
      top: 55px;
      background-color: #ffffff;
      min-width: 200px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.25);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      border: 1px solid #eeeeee;
      overflow: hidden;
    }

    .hidden-dropdown { display: none !important; }

    .dropdown-content button {
      background: none;
      color: #333333;
      padding: 14px 16px;
      text-align: left;
      border: none;
      font-size: 14px;
      border-bottom: 1px solid #f1f1f1;
      margin: 0;
      border-radius: 0;
    }
    .dropdown-content button:hover { background-color: #f5f5f5; }
    .danger-btn { color: #d32f2f !important; font-weight: bold; }
  </style>
</head>

<body>
  <!-- REPORT ENTRY MODAL -->
  <div id="reportModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="reportModalTitle">
    <div class="modal-content">
      <h3 id="reportModalTitle">📝 Submit New Report</h3>
      
      <label for="count">Count (How many?):</label>
      <input type="text" id="count" placeholder="e.g., 2 people, 1 vehicle">
      
      <label for="location">Location Details:</label>
      <input type="text" id="location" placeholder="e.g., NE corner of intersection">
      
      <label for="equipment">Equipment/Vehicles:</label>
      <input type="text" id="equipment" placeholder="e.g., White Ford F-150">

      <label for="resources">Resources Needed:</label>
      <input type="text" id="resources" placeholder="e.g., Water, Medics, Tow Truck">
      
      <label for="priority">Encounter Type & Priority:</label>
      <select id="priority">
        <option value="Low">Low - Unknown / Suspicious Activity</option>
        <option value="Medium">Medium - Local Police / Unmarked</option>
        <option value="High">High - HCSO / PCSO / BCP / Federal</option>
      </select>
      
      <label for="actions">Observed Actions:</label>
      <textarea id="actions" rows="3" placeholder="e.g., Unloading materials..."></textarea>

      <!-- FORM VALIDATION ERROR AND BUTTONS -->
      <div id="reportError" class="error-msg">⚠️ Please enter at least one detail before submitting.</div>
      
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeReportModal()">Cancel</button>
        <button id="submitReportBtn" onclick="submitReport()" disabled>Submit Report</button>
      </div>
    </div>
  </div>

  <!-- COPY TEXT MODAL -->
  <div id="copyModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="copyModalTitle">
    <div class="modal-content">
      <h3 id="copyModalTitle">📋 Formatted Report</h3>
      <textarea id="reportText" rows="10" readonly aria-readonly="true"></textarea>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeCopyModal()">Close</button>
        <button onclick="copyReport()">Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP LANDMARK -->
  <main>
    <!-- PASSWORD SCREEN -->
    <div id="login-screen" role="region" aria-label="Authentication">
      <h3>🛡️ Secure Access Required</h3>
      <label for="accessCodeInput" style="font-weight: bold; margin-bottom: 5px;">Enter dispatcher access code:</label>
      <input type="password" id="accessCodeInput" placeholder="Access code..." aria-required="true" />
      <button onclick="checkAccess()" aria-label="Submit access code">Enter</button>
      <div id="login-error" role="alert" aria-live="assertive" style="color: #d90000; margin-top: 10px; text-align: center; font-weight: bold; max-width: 80%;"></div>
    </div>

    <!-- MAIN APP CONTROLS -->
    <div id="main-app" class="hidden-screen" inert aria-hidden="true">
      
      <!-- FIXED Top Right Menu -->
      <div class="top-right-menu" id="menuContainer">
        <button class="menu-fab" onclick="toggleDropdown(event)" aria-label="Open Menu">
          <span style="font-size: 20px;">☰</span>
        </button>
        
        <div id="actionDropdown" class="dropdown-content hidden-dropdown">
          <button onclick="copyCLEAR()">📋 Copy CLEAR Report</button>
          <button onclick="logout()" class="danger-btn">🚪 Logout / Clear</button>
        </div>
      </div>

      <div class="controls">
        <h3 style="margin-top: 0;">🛡️ Anonymous Community Map</h3>

                <div style="margin-bottom: 10px; display: flex; gap: 5px;">
          <input type="text" id="searchInput" placeholder="Search neighborhood..." style="flex-grow: 1; padding: 12px; border-radius: 4px; border: 2px solid #555;">
          <button onclick="window.searchLocation()" style="background: #222222; margin: 0; padding: 12px 16px;">🔍</button>
          
          <!-- NEW: Geolocation Button -->
          <button onclick="window.centerOnMe()" style="background: #005a87; margin: 0; padding: 12px 16px;" aria-label="Center map on my location">📍 Me</button>
        </div>

        <button onclick="toggleReport()" aria-label="Toggle drop pin mode" style="background: #b30000; font-size: 16px;">📍 Drop Pin</button>
        <span id="status" role="status" aria-live="polite" style="font-weight: bold; margin-left: 10px;">Ready</span>
      </div>
      
      <!-- Leaflet Map Container -->
      <div id="map" aria-label="Interactive incident map"></div>
      
      <!-- RECENT REPORTS LIST -->
      <div id="recentContainer" style="padding: 15px; background: #f9f9f9;">
        <h4 style="margin-top: 0;">Recent Reports</h4>
        <div id="recentList" style="font-size: 0.9em; color: #444;">
          <!-- JavaScript will populate this list -->
        </div>
      </div>

    </div>
  </main>

  <!-- SCRIPTS: Order matters! -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/privacy.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/map.js"></script>

</body>
</html>
