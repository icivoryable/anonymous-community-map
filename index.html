<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Community Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 70vh; width: 100%; }
    .controls { padding: 10px; background: #f0f0f0; }
    .clear-report { background: red; color: white; padding: 10px; margin: 10px 0; }
    button { background: #007cba; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; }
    textarea { width: 100%; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="controls">
    <h3>🛡️ Anonymous Community Map</h3>
    <button onclick="toggleReport()">📍 Drop Pin</button>
    <button onclick="copyCLEAR()">📋 Copy CLEAR Report</button>
    <div id="status">Ready</div>
  </div>
  <div id="map"></div>
  <div class="clear-report" id="clearReport" style="display:none;">
    <strong>CLEAR Report (copy to Signal):</strong><br>
    <textarea id="clearText" rows="4"></textarea>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const clearBox = document.getElementById('clearReport');
    const clearText = document.getElementById('clearText');
    const map = L.map('map').setView([27.9506, -82.4572], 12);
    const markers = L.layerGroup().addTo(map);
    let dropMode = false;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    function setStatus(msg) { statusEl.textContent = msg; }
    function popupNode(message) {
      const div = document.createElement('div');
      div.textContent = message?.trim() ? message.trim() : 'Anonymous pin';
      return div;
    }

    async function loadPins() {
      try {
        setStatus('Loading pins…');
        const res = await fetch('/api/pins');
        if (!res.ok) throw new Error(`GET /api/pins failed: ${res.status}`);
        const pins = await res.json();
        markers.clearLayers();
        pins.forEach(p => {
          L.marker([p.lat, p.lng])
            .addTo(markers)
            .bindPopup(popupNode(p.message));
        });
        setStatus('Ready');
      } catch (e) {
        setStatus(`Error: ${e.message}`);
      }
    }

    map.on('click', async (e) => {
      if (!dropMode) return;
      const message = prompt('Optional note (anonymous):') ?? '';

      try {
        setStatus('Saving pin…');
        const res = await fetch('/api/pins', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lat: e.latlng.lat, lng: e.latlng.lng, message })
        });
        if (!res.ok) throw new Error(`POST /api/pins failed: ${res.status}`);
        const pin = await res.json();

        L.marker([pin.lat, pin.lng])
          .addTo(markers)
          .bindPopup(popupNode(pin.message))
          .openPopup();

        clearText.value = `Lat: ${pin.lat}, Lng: ${pin.lng}\nNote: ${pin.message || '(none)'}`;
        setStatus('Pin saved');
      } catch (e) {
        setStatus(`Error: ${e.message}`);
      } finally {
        dropMode = false;
      }
    });

    window.toggleReport = function toggleReport() {
      dropMode = !dropMode;
      setStatus(dropMode ? 'Drop mode: click map to add a pin' : 'Ready');
    };

    window.copyCLEAR = async function copyCLEAR() {
      clearBox.style.display = 'block';
      clearText.select();
      await navigator.clipboard.writeText(clearText.value);
      setStatus('Copied');
    };

    loadPins();
  </script>
</body>
</html>
