  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Community Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 70vh; width: 100%; }
    .controls { padding: 10px; background: #f0f0f0; }
    .clear-report { background: red; color: white; padding: 10px; margin: 10px 0; }
    button { background: #007cba; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px;}
    textarea { width: 100%; box-sizing: border-box; }

    /* Login Screen Styles */
    #login-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: white; z-index: 9999; display: flex; 
      flex-direction: column; align-items: center; justify-content: center;
    }
    #login-screen input { padding: 10px; font-size: 16px; margin: 10px 0; width: 80%; max-width: 300px; border: 1px solid #ccc; border-radius: 4px;}
    
    /* Hides the main app until they log in */
    #main-app { display: none; } 
  </style>
</head>

<body>
  <!-- PASSWORD SCREEN -->
  <div id="login-screen">
    <h3>🛡️ Secure Access Required</h3>
    <p>Enter dispatcher access code:</p>
    <input type="password" id="accessCodeInput" placeholder="Access code..." />
    <button onclick="checkAccess()">Enter</button>
    <div id="login-error" style="color: red; margin-top: 10px; text-align: center; max-width: 80%;"></div>
  </div>

  <!-- MAIN APP -->

  <!-- MAIN APP -->
  <div id="main-app">
    <div class="controls">
      <h3>🛡️ Anonymous Community Map</h3>
      
      <!-- NEW SEARCH BAR -->
      <div style="margin-bottom: 10px; display: flex; gap: 5px;">
        <input type="text" id="searchInput" placeholder="Search neighborhood or intersection..." style="flex-grow: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <button onclick="searchLocation()" style="background: #333; margin: 0;">🔍 Search</button>
      </div>

      <button onclick="toggleReport()">📍 Drop Pin</button>
      <button onclick="copyCLEAR()">📋 Copy CLEAR Report</button>
      <button onclick="logout()" style="background: #d9534f; float: right;">Logout</button>
      <div id="status">Ready</div>
    </div>
    <div id="map"></div>

  <div id="main-app">
    <div class="controls">
      <h3>🛡️ Anonymous Community Map</h3>
      <button onclick="toggleReport()">📍 Drop Pin</button>
      <button onclick="copyCLEAR()">📋 Copy CLEAR Report</button>
      <button onclick="logout()" style="background: #d9534f; float: right;">Logout</button>
      <div id="status">Ready</div>
    </div>
    <div id="map"></div>
    <div class="clear-report" id="clearReport" style="display:none;">
      <strong>CLEAR Report (copy to Signal):</strong><br>
      <textarea id="clearText" rows="4"></textarea>
    </div>
  </div>

  <!-- LEAFLET SCRIPT -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- APP LOGIC SCRIPT -->
  <script>
    const statusEl = document.getElementById('status');
    const clearBox = document.getElementById('clearReport');
    const clearText = document.getElementById('clearText');
    let map = null;
    let markers = null;
    let dropMode = false;

    function initMap() {
      if (map) return; // Don't initialize twice
      map = L.map('map').setView([27.9506, -82.4572], 12);
      markers = L.layerGroup().addTo(map);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);

      // Handle map clicks for dropping pins
      map.on('click', async (e) => {
        if (!dropMode) return;
        
        const statusInput = prompt('Enter status (Type 1, 2, 3, or 4):\n1 = Reported\n2 = Under Verification\n3 = Confirmed\n4 = Resolved', '1');
        if (!statusInput) { dropMode = false; setStatus('Ready'); return; }
        
        let statusString = 'Reported';
        if (statusInput === '2') statusString = 'Under Verification';
        if (statusInput === '3') statusString = 'Confirmed';
        if (statusInput === '4') statusString = 'Resolved';

        const message = prompt('Optional note (anonymous):') ?? '';

        try {
          setStatus('Saving pin… (Location is being automatically fuzzed)');
          const code = localStorage.getItem('map_access_code');
          
          const res = await fetch('/api/pins', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'x-access-code': code 
            },
            body: JSON.stringify({ lat: e.latlng.lat, lng: e.latlng.lng, message, status: statusString })
          });
          
          if (res.status === 401) { logout(); return; }
          if (!res.ok) throw new Error(`POST failed: ${res.status}`);
          
          const pin = await res.json();

          L.marker([pin.lat, pin.lng], { icon: getColoredIcon(pin.status) })
            .addTo(markers)
            .bindPopup(popupNode(pin))
            .openPopup();

          clearText.value = `Status: ${pin.status}\nLat: ${pin.lat.toFixed(4)}, Lng: ${pin.lng.toFixed(4)}\nNote: ${pin.description || '(none)'}`;
          setStatus('Pin saved securely');
        } catch (err) {
          setStatus(`Error: ${err.message}`);
        } finally {
          dropMode = false;
        }
      });
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    function getColoredIcon(status) {
      let color = 'blue'; 
      if (status === 'Reported') color = 'grey';
      if (status === 'Confirmed') color = 'red';
      if (status === 'Resolved') color = 'green';
      
      return new L.Icon({
        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
      });
    }

    function popupNode(pin) {
      const div = document.createElement('div');
      div.innerHTML = `
        <strong>Status: ${pin.status || 'Reported'}</strong><br/>
        <span style="font-size: 0.9em; color: #555;">Note: ${pin.description || 'No note'}</span><br/>
        <span style="font-size: 0.8em; color: #888;">Reported: ${new Date(pin.createdAt).toLocaleTimeString()}</span>
      `;
      return div;
    }

    // --- LOGIN & DATA FETCHING LOGIC ---
    async function checkAccess() {
      const inputEl = document.getElementById('accessCodeInput');
      const errorEl = document.getElementById('login-error');
      
      // If they clicked the button, use the input box. Otherwise, check local storage.
      const code = inputEl.value || localStorage.getItem('map_access_code');
      if (!code) return;
      
      errorEl.textContent = "Checking credentials...";
      
      try {
        const res = await fetch('/api/pins', {
          headers: { 'x-access-code': code }
        });
        
        if (res.status === 401) {
          errorEl.textContent = "Incorrect access code.";
          localStorage.removeItem('map_access_code');
          return;
        }
        
        if (!res.ok) {
          errorEl.textContent = `Server error: ${res.status}`;
          return;
        }
        
        // --- SUCCESS! SHOW THE MAP ---
        localStorage.setItem('map_access_code', code);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        // Initialize map now that it is visible
        initMap();
        map.invalidateSize(); 
        
        // Load the pins onto the map
        const pins = await res.json();
        markers.clearLayers();
        pins.forEach(p => {
          L.marker([p.lat, p.lng], { icon: getColoredIcon(p.status) })
            .addTo(markers)
            .bindPopup(popupNode(p));
        });
        setStatus('Ready');

      } catch (err) {
        errorEl.textContent = `Network error: ${err.message}`;
      }
    }

    function logout() {
      localStorage.removeItem('map_access_code');
      location.reload();
    }

        // --- SEARCH LOGIC ---
    async function searchLocation() {
      const query = document.getElementById('searchInput').value;
      if (!query) return;

      setStatus('Searching...');
      
      try {
        // Appends "Tampa, FL" to help the free geocoder prioritize local results
        const searchQuery = encodeURIComponent(query + ", Tampa, FL");
        
        // Nominatim is OpenStreetMap's free geocoder. No API key required.
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${searchQuery}&limit=1`);
        const data = await res.json();

        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          
          // Fly the map to the location and zoom in (zoom level 16 is neighborhood level)
          map.flyTo([lat, lon], 16, { animate: true, duration: 1.5 });
          setStatus(`Found: ${data[0].display_name.split(',')[0]}`);
          
          // Optional: automatically turn on Drop Pin mode when they search
          if (!dropMode) toggleReport(); 
        } else {
          setStatus('Location not found. Try a broader term.');
        }
      } catch (err) {
        setStatus('Search error. Try zooming manually.');
      }
    }

    // Allow pressing "Enter" in the search box to trigger the search
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        searchLocation();
      }
    });

    window.toggleReport = function toggleReport() {
      dropMode = !dropMode;
      setStatus(dropMode ? 'Drop mode: click map to add a pin' : 'Ready');
    };

    window.copyCLEAR = async function copyCLEAR() {
      clearBox.style.display = 'block';
      clearText.select();
      await navigator.clipboard.writeText(clearText.value);
      setStatus('Copied');
    };

    // Auto-login check when page loads
    window.onload = () => {
      if (localStorage.getItem('map_access_code')) {
        checkAccess();
      }
    };
  </script>
</body>
</html>
